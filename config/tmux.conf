# ─────────────────────────────────────────────────────────────
#  tmux.conf — tmux 3.x+
# ─────────────────────────────────────────────────────────────

# ── General ──────────────────────────────────────────────────
set  -s escape-time 0                # No delay after Escape (vim sanity)
set  -g history-limit 50000          # Generous scrollback
set  -g display-time 4000            # Show status messages longer
set  -g status-interval 5            # Refresh status bar every 5s
set  -g focus-events on              # Pass focus events to apps
setw -g aggressive-resize on         # Resize to smallest *active* client

# Terminal & colors
set  -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Start numbering at 1 (0 is across the keyboard)
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on          # No gaps after closing a window

# ── Mouse & Scroll ──────────────────────────────────────────
set  -g mouse on                     # Click panes, drag borders, scroll

# Scroll 2 lines per tick (default 5 feels jumpy)
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 2 scroll-down

# Smart scroll: pass events to alternate-screen apps (vim, less, man)
bind -n WheelUpPane   if-shell -F -t = "#{alternate_on}" \
  "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind -n WheelDownPane if-shell -F -t = "#{alternate_on}" \
  "send-keys -M" "select-pane -t =; send-keys -M"

# Don't exit copy mode on mouse drag end (select, then press y to copy)
unbind -T copy-mode-vi MouseDragEnd1Pane

# Middle-click to paste
bind -n MouseDown2Pane paste-buffer

# Toggle mouse on/off with prefix + m
bind m set-option -g mouse \; display-message "Mouse: #{?mouse,ON,OFF}"

# ── Prefix ───────────────────────────────────────────────────
unbind C-b
set  -g prefix C-Space
bind C-Space send-prefix

# ── Splits & Windows ────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Navigation (vim-style) ─────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Switch windows with Shift+Arrow (no prefix)
bind -n S-Left  previous-window
bind -n S-Right next-window

# ── Copy Mode (vi) ──────────────────────────────────────────
setw -g mode-keys vi

bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y   send-keys -X copy-selection-and-cancel

# System clipboard (macOS) — change to xclip/wl-copy on Linux
set -s copy-command 'pbcopy'
set -s set-clipboard on

# ── Quality of Life ─────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Silence bells and visual noise
set  -g visual-activity  off
set  -g visual-bell       off
set  -g visual-silence    off
setw -g monitor-activity  off
set  -g bell-action       none

# ── Status Bar (built-in, no plugin needed) ─────────────────
set  -g status-position bottom
set  -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set  -g status-left-length 30
set  -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[default] "

set  -g status-right-length 40
set  -g status-right "#[fg=#a6adc8] %b %d  %H:%M "

setw -g window-status-format         " #[fg=#6c7086]#I:#W "
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#f38ba8,bold] #I:#W "

# Pane borders
set  -g pane-border-style        "fg=#313244"
set  -g pane-active-border-style "fg=#89b4fa"
